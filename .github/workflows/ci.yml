name: CI

on:
  push:
  pull_request:

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd backend
          pytest

      - name: Code quality check
        run: |
          cd backend
          flake8 .

      - name: Security scan
        run: |
          cd backend
          bandit -r .

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd frontend
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          cd frontend
          pytest

      - name: Code quality check
        run: |
          cd frontend
          flake8 .

      - name: Security scan
        run: |
          cd frontend
          bandit -r .

  build:
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        run: docker build ./backend -t infra-backend

      - name: Build frontend image
        run: docker build ./frontend -t infra-frontend

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/infra-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/infra-frontend:latest